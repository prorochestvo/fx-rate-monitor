name: release

# Tests run on every push/PR to main (see ci.main.yml). Deployment fires only
# when an r* release tag is pushed (e.g. r_0.0.1 or r0.0.1) — the tag is the
# version that ships and its leading r is the release-channel marker carried into
# VERSION_ID. NOTE: the PRIME environment also gates which tags may deploy; if its
# policy is r_*, use r_X.Y.Z (widen it to r* to allow bare rX.Y.Z too).
#
# Deploy model (see the release-layout convention): build the four binaries,
# upload them into an immutable, never-reused artifacts/<VERSION_ID>/ dir, flip
# the bin/release channel symlink, migrate + restart, and health-gate with an
# automatic symlink rollback. The deploy user writes only inside artifacts/ and
# bin/; the only privileged actions are two narrow `sudo systemctl` calls.
on:
  push:
    tags:
      - 'r*'

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make lint
      - run: make test

  deploy:
    environment: PRIME
    runs-on: ubuntu-latest
    needs: lint-and-test
    # Constant group serializes deploys across tag refs hitting the same server.
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    env:
      REMOTE_DIR: ${{ vars.REMOTE_DIR }}
      SSH_HOSTNAME: ${{ vars.SSH_HOSTNAME }}
      SSH_HOSTPORT: ${{ vars.SSH_HOSTPORT }}
      SSH_USERNAME: ${{ vars.SSH_USERNAME }}
      CHANNEL: release
      HEALTH_URL: http://localhost:8000/health/check
    steps:
      - name: Validate release tag
        run: |
          set -euo pipefail
          if ! [[ "$GITHUB_REF_NAME" =~ ^r_?[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "ERROR: tag ${GITHUB_REF_NAME} is not a release tag (expected rX.Y.Z or r_X.Y.Z, optional -prerelease)"
            exit 1
          fi

      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Compute version id
        id: vid
        run: |
          # VERSION_ID = <UTC timestamp>-<tag>; the tag already carries the r_ release-channel prefix.
          echo "vid=$(date -u +%Y%m%d%H%M%S)-${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "commit_hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build (linux/amd64)
        env:
          APP_BUILD_OPTIONS: "-s -w -X 'main.BuildVersion=${{ github.ref_name }}' -X main.BuildTime=${{ steps.vid.outputs.build_time }} -X main.BuildHash=${{ steps.vid.outputs.commit_hash }}"
        run: |
          mkdir -p ./cmd/web/static ./build
          cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" ./cmd/web/static/wasm_exec.js
          CGO_ENABLED=0 GOOS=js GOARCH=wasm go build -o ./cmd/web/static/app.wasm ./cmd/wasm
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="${APP_BUILD_OPTIONS}" -o ./build/webapp    ./cmd/web
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="${APP_BUILD_OPTIONS}" -o ./build/collector ./cmd/collector
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="${APP_BUILD_OPTIONS}" -o ./build/notifier  ./cmd/notifier
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="${APP_BUILD_OPTIONS}" -o ./build/migrator  ./cmd/migrator

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATEKEY }}
        run: |
          install -m 600 /dev/null /tmp/deploy_key
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_HOSTPORT" "$SSH_HOSTNAME" >> ~/.ssh/known_hosts

      - name: Upload artifact set
        run: |
          exec > >(tee -a "$RUNNER_TEMP/deploy_trace.log") 2>&1
          VID="${{ steps.vid.outputs.vid }}"
          SCP="scp -P $SSH_HOSTPORT -i /tmp/deploy_key"
          SSH="ssh -p $SSH_HOSTPORT -i /tmp/deploy_key $SSH_USERNAME@$SSH_HOSTNAME"

          # Immutable, never-reused version dir inside the CI sandbox.
          $SSH "mkdir -p $REMOTE_DIR/artifacts/$VID"
          $SCP ./build/webapp ./build/collector ./build/notifier ./build/migrator \
               "$SSH_USERNAME@$SSH_HOSTNAME:$REMOTE_DIR/artifacts/$VID/"
          $SSH "chmod +x $REMOTE_DIR/artifacts/$VID/*"

      - name: Verify checksums
        run: |
          exec > >(tee -a "$RUNNER_TEMP/deploy_trace.log") 2>&1
          VID="${{ steps.vid.outputs.vid }}"
          SCP="scp -P $SSH_HOSTPORT -i /tmp/deploy_key"
          SSH="ssh -p $SSH_HOSTPORT -i /tmp/deploy_key $SSH_USERNAME@$SSH_HOSTNAME"

          ( cd ./build && sha256sum webapp collector notifier migrator > artifacts.sha256 )
          $SCP ./build/artifacts.sha256 "$SSH_USERNAME@$SSH_HOSTNAME:$REMOTE_DIR/artifacts/$VID/artifacts.sha256"
          $SSH "cd $REMOTE_DIR/artifacts/$VID && sha256sum -c artifacts.sha256 && rm -f artifacts.sha256" \
            || (echo 'checksum mismatch, aborting'; exit 1)

      - name: Flip channel, migrate, restart, health-gate
        run: |
          exec > >(tee -a "$RUNNER_TEMP/deploy_trace.log") 2>&1
          VID="${{ steps.vid.outputs.vid }}"
          SSH="ssh -p $SSH_HOSTPORT -i /tmp/deploy_key $SSH_USERNAME@$SSH_HOSTNAME"

          # Remember the currently-live version so a failed deploy self-heals.
          PREV="$($SSH "basename \$(readlink $REMOTE_DIR/bin/$CHANNEL 2>/dev/null || true)" 2>/dev/null || true)"
          echo "previous: ${PREV:-none}; new: $VID"

          # Flip first (relative target), then migrate with the just-released
          # migrator (root, via the one-shot unit), then restart the webapp.
          $SSH "ln -sfn ../artifacts/$VID $REMOTE_DIR/bin/$CHANNEL"
          $SSH "sudo systemctl start beacon-migrate"
          $SSH "sudo systemctl restart beacon"

          # wait past RestartSec=5s so a crash-looping service reads as down
          sleep 6
          if $SSH "curl -fsS $HEALTH_URL >/dev/null"; then
            echo "deploy $VID live on $CHANNEL"
          else
            echo "health check failed — rolling back to ${PREV:-none}"
            if [ -n "$PREV" ]; then
              $SSH "ln -sfn ../artifacts/$PREV $REMOTE_DIR/bin/$CHANNEL && sudo systemctl restart beacon"
            fi
            $SSH "sudo journalctl -u beacon -n 50 --no-pager" || true
            exit 1
          fi

      - name: Prune old artifacts
        if: success()
        run: |
          SSH="ssh -p $SSH_HOSTPORT -i /tmp/deploy_key $SSH_USERNAME@$SSH_HOSTNAME"
          # Keep the newest 5 versions plus anything a channel still points at.
          $SSH 'set -e; APP='"$REMOTE_DIR"'; KEEP=5; \
            in_use="$(for l in $APP/bin/*; do [ -e "$l" ] && basename "$(readlink -f "$l")"; done | sort -u)"; \
            ls -1dt $APP/artifacts/*/ 2>/dev/null | tail -n +$((KEEP+1)) | while read -r d; do \
              v="$(basename "$d")"; grep -qxF "$v" <<<"$in_use" || rm -rf "$d"; \
            done'

      - name: Cleanup SSH
        if: always()
        run: rm -f /tmp/deploy_key

      - name: Notify success
        if: success()
        env:
          ACTION_EMITER_TBOT_TOKEN: ${{ secrets.ACTION_EMITER_TBOT_TOKEN }}
          TELEGRAM_ROOT_CHAT_ID: ${{ vars.TELEGRAM_ROOT_CHAT_ID }}
          APP_LABEL: ""
          ACTION: ""
        run: |
          [ -n "$ACTION_EMITER_TBOT_TOKEN" ] && [ -n "$TELEGRAM_ROOT_CHAT_ID" ] || exit 0
          PROJECT_TAG=$(echo "${GITHUB_REPOSITORY##*/}" | tr 'a-z-' 'A-Z_' | tr -cd 'A-Z0-9_')
          WF_REF="${GITHUB_WORKFLOW_REF%@*}"; WF_FILE="${WF_REF##*/}"
          LABEL="${APP_LABEL:+$APP_LABEL }"
          ACTION="${ACTION:-deploy}"
          text=$(printf '#%s %s%s <b>passed</b>\n<b>%s</b> <i>(%s)</i>\nref:  %s (%s)\nrun:  <a href="%s/%s/actions/runs/%s">#%s</a>' \
            "$PROJECT_TAG" "$LABEL" "$ACTION" "$GITHUB_REPOSITORY" "$WF_FILE" "$GITHUB_REF_NAME" "${GITHUB_SHA:0:7}" \
            "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID" "$GITHUB_RUN_ID")
          curl -s -X POST "https://api.telegram.org/bot${ACTION_EMITER_TBOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_ROOT_CHAT_ID}" \
            --data-urlencode "text=${text}" \
            -d parse_mode=HTML -d disable_web_page_preview=true >/dev/null || true

      - name: Notify failure
        if: failure()
        env:
          ACTION_EMITER_TBOT_TOKEN: ${{ secrets.ACTION_EMITER_TBOT_TOKEN }}
          TELEGRAM_ROOT_CHAT_ID: ${{ vars.TELEGRAM_ROOT_CHAT_ID }}
          APP_LABEL: ""
          ACTION: ""
        run: |
          [ -n "$ACTION_EMITER_TBOT_TOKEN" ] && [ -n "$TELEGRAM_ROOT_CHAT_ID" ] || exit 0
          PROJECT_TAG=$(echo "${GITHUB_REPOSITORY##*/}" | tr 'a-z-' 'A-Z_' | tr -cd 'A-Z0-9_')
          WF_REF="${GITHUB_WORKFLOW_REF%@*}"; WF_FILE="${WF_REF##*/}"
          LABEL="${APP_LABEL:+$APP_LABEL }"
          ACTION="${ACTION:-deploy}"
          reason=""
          if [ -f "$RUNNER_TEMP/deploy_trace.log" ]; then
            reason=$(grep -iE 'error|sudo:|denied|mismatch|not active|not found|refused|timed out|no route|rolling back|health check' \
              "$RUNNER_TEMP/deploy_trace.log" | tail -n 3 | cut -c1-300)
          fi
          text=$(printf '#%s %s%s <b>failed</b>\n<b>%s</b> <i>(%s)</i>\nref:  %s (%s)\nrun:  <a href="%s/%s/actions/runs/%s">#%s</a>' \
            "$PROJECT_TAG" "$LABEL" "$ACTION" "$GITHUB_REPOSITORY" "$WF_FILE" "$GITHUB_REF_NAME" "${GITHUB_SHA:0:7}" \
            "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID" "$GITHUB_RUN_ID")
          if [ -n "$reason" ]; then
            esc=$(printf '%s' "$reason" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
            text=$(printf '%s\n<pre>%s</pre>' "$text" "$esc")
          fi
          curl -s -X POST "https://api.telegram.org/bot${ACTION_EMITER_TBOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_ROOT_CHAT_ID}" \
            --data-urlencode "text=${text}" \
            -d parse_mode=HTML -d disable_web_page_preview=true >/dev/null || true
