listen 443 ssl http2;

charset utf-8;
client_max_body_size 128M;

# gzip is configured in a dedicated snippet so the BREACH-risk rationale
# and the application/wasm exclusion live next to the directives they
# explain. See snippet header for details.
include /etc/nginx/snippets/kz.be-happy.gzip.conf;

access_log /var/log/nginx/kz.be-happy.access.default.log;
error_log /var/log/nginx/kz.be-happy.error.default.log;

# Domain identification header — a debug breadcrumb that confirms which
# vhost served a request when multiple domains share this host. Intentional;
# do not remove this include. The contents are operator-owned and live
# outside this repo at the include path below — that decouples the literal
# value from the project (this codebase could be deployed under any host
# identity). If the file is missing on a new server, `nginx -t` fails loudly
# at deploy validation, which is the correct failure mode for a marker that
# is supposed to be a deliberate operator decision rather than silently
# absent.
include /etc/nginx/snippets/kz.be-happy.server-identity.conf;

# Edge cache for content-hashed static assets.
# Regex is intentionally tight: exactly 8 hex characters, fixed extension.
# This block MUST stay above "location /" — nginx evaluates regex locations in
# source order, and the prefix catch-all "/" would swallow these requests first
# if the regex block appeared below it.
location ~* "^/(app|wasm_exec)\.[a-f0-9]{8}\.(wasm|js)$" {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://$backend$request_uri;

    # Strip any Cache-Control the Go origin emits so the add_header below is
    # the sole source of truth for the cache policy on these paths.
    proxy_hide_header Cache-Control;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable" always;

    # nginx `add_header` inheritance is all-or-nothing: this location's
    # cache directive would otherwise drop the server-scope domain identifier.
    # Re-include the operator-owned snippet to preserve it on hashed-asset
    # responses. See the same include at server scope above for the rationale.
    include /etc/nginx/snippets/kz.be-happy.server-identity.conf;
}

# proxy settings for internal services
location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://$backend$request_uri;

    error_page 502 503 504 /custom_50x.html;
    location = /custom_50x.html {
        root /var/www/kz.be-happy;
        internal;
    }
}

# include SSL certificates
include /etc/nginx/certificates/kz.be-happy.conf;
