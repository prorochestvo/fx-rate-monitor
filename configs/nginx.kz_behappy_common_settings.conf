listen 443 ssl http2;

charset utf-8;
client_max_body_size 128M;
gzip on;

access_log /var/log/nginx/kz.be-happy.access.default.log;
error_log /var/log/nginx/kz.be-happy.error.default.log;

add_header X-SERVER-HEADER "NGINX_KZ_BEHAPPY_WEB";

# proxy settings for internal services
location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://$backend$request_uri;

    error_page 502 503 504 /custom_50x.html;
    location = /custom_50x.html {
        root /var/www/kz.be-happy;
        internal;
    }
}

# include SSL certificates
include /etc/nginx/certificates/kz.be-happy.conf;
