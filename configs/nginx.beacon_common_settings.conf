listen 443 ssl http2;
listen [::]:443 ssl http2;

# Shared Cloudflare Origin certificate for *.seilbekskindirov.dev. Operator-placed
# (mode 0600 on the key); never shipped from this repo. Trusted only by Cloudflare.
ssl_certificate     /etc/nginx/certificates/cloudflare/seilbekskindirov.dev.pem;
ssl_certificate_key /etc/nginx/certificates/cloudflare/seilbekskindirov.dev.key;

# Authenticated Origin Pulls: accept only connections that present Cloudflare's
# client certificate, so the origin cannot be reached directly bypassing the edge.
# The CA bundle is fetched by `make init`.
ssl_client_certificate /etc/nginx/certificates/cloudflare/origin-pull-ca.pem;
ssl_verify_client      on;

charset utf-8;
client_max_body_size 128M;

# gzip lives in a dedicated snippet so the BREACH-risk rationale and the
# application/wasm exclusion sit next to the directives they explain.
include /etc/nginx/snippets/beacon.gzip.conf;

# Edge cache for content-hashed static assets.
# Regex is intentionally tight: exactly 8 hex characters, fixed extension.
# This block MUST stay above "location /" — nginx evaluates regex locations in
# source order, and the prefix catch-all "/" would swallow these requests first
# if the regex block appeared below it.
location ~* "^/(app|wasm_exec)\.[a-f0-9]{8}\.(wasm|js)$" {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://$backend$request_uri;

    # Strip any Cache-Control the Go origin emits so the add_header below is
    # the sole source of truth for the cache policy on these paths.
    proxy_hide_header Cache-Control;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable" always;
}

# proxy settings for the Beacon web binary
location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://$backend$request_uri;
}
