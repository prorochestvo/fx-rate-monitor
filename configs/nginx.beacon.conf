# Public edge vhost for Beacon, fronted by Cloudflare (proxied).
#
# Request path:
#   client --TLS--> Cloudflare (edge cert) --TLS (mTLS)--> this vhost (:443)
#          --loopback http--> 127.0.0.1:8000 (Beacon web binary)

upstream beacon_web {
    server 127.0.0.1:8000;
}

# HTTP -> HTTPS redirect. Cloudflare reaches the origin over HTTPS in Full
# (strict) mode; this is belt-and-suspenders for direct hits.
server {
    listen 80;
    listen [::]:80;
    server_name beacon.seilbekskindirov.dev;
    return 301 https://$host$request_uri;
}

server {
    server_name beacon.seilbekskindirov.dev;

    set $backend beacon_web;

    access_log /var/log/nginx/beacon.access.log;
    error_log  /var/log/nginx/beacon.error.log;

    include /etc/nginx/snippets/beacon.common_settings.conf;
}
