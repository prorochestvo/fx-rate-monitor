# Shared gzip configuration for the kz.be-happy vhost.
#
# Compression level 6 is the canonical sweet spot: level 9 buys <2% extra
# compression at ~3x CPU cost; level 1 is faster but loses ~10% of the win.
#
# gzip_proxied any is required: every location in this vhost is a
# proxy_pass to the Go upstream, and nginx's default (gzip_proxied off)
# silently skips compression for proxied responses whenever the upstream
# sets cache-related headers — defeating the whole point on the JSON API
# and Mini App paths.
#
# gzip_vary on adds Vary: Accept-Encoding so downstream caches never
# serve a gzipped body to a non-gzip-aware client.
#
# application/wasm is intentionally NOT in gzip_types: the Go server
# (cmd/web/main.go wasmGzipHandler) serves the pre-compressed
# app.wasm.gz sibling itself with Content-Encoding: gzip. Re-compressing
# here would either double-encode or duplicate the CPU work.
#
# BREACH-class risk acknowledgement:
#   Enabling gzip on HTTPS responses creates a theoretical BREACH-class
#   side-channel when a response contains both attacker-controlled input
#   and a reflected secret in the same body. fx_rate_monitor has no CSRF
#   cookies or session tokens reflected into HTML responses. The Mini App
#   authenticates via Telegram WebApp initData HMAC validated server-side
#   per request, not session cookies. JSON API responses do not embed
#   secrets keyed to user-controlled fields. Practical exposure is judged
#   minimal. Revisit if CSRF tokens or cookie reflection are introduced.

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
# text/html is intentionally omitted: nginx's default gzip_types is
# `text/html` and the directive is set unconditionally when `gzip on;`
# is in effect. Re-listing it here produces a `duplicate MIME type
# "text/html"` warning at `nginx -t` time without any compression benefit.
gzip_types
    application/javascript
    application/json
    application/xml
    image/svg+xml
    text/css
    text/plain
    text/xml;