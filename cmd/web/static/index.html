<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FX Rate Monitor</title>
  <style>
    body { font-family: monospace; padding: 1.5rem; background: #fafafa; }
    h1 { font-size: 1.4rem; }
    h2 { font-size: 1.1rem; margin-top: 2rem; border-bottom: 1px solid #ccc; }
    #status { color: #888; font-size: 0.85rem; margin-bottom: 1rem; }
    table { border-collapse: collapse; width: 100%; margin-top: 0.5rem; }
    th, td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
    th { background: #f0f0f0; }
    a { color: #0066cc; cursor: pointer; }
  </style>
</head>
<body>
  <h1>FX Rate Monitor</h1>
  <p id="status">Loading…</p>
  <div id="app"></div>
  <script src="wasm_exec.js"></script>
  <script>
    const go = new Go();
    WebAssembly.instantiateStreaming(fetch("app.wasm"), go.importObject)
      .then(result => go.run(result.instance))
      .catch(err => { document.getElementById("status").textContent = "Failed: " + err; });
  </script>
</body>
</html>
