<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://telegram.org; script-src 'self' https://telegram.org 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline';">
  <title>Beacon</title>
  <!--
    Load the Telegram WebApp SDK unconditionally so both dispatch arms work
    from the same HTML. In a plain browser tab the SDK noops and leaves
    window.Telegram.WebApp.initData empty, which routes to renderPublicSubscriptions.
    Do not strip this tag — without it the Mini App arm of the dispatcher breaks.
    CSP load-bearing origins: https://telegram.org is required for this script tag
    and for the SDK's own connect-src requests.
  -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      padding: 12px;
      min-height: 100vh;
    }
    /*
     * #app is the screen container; making it position: relative establishes
     * the containing block for the absolutely positioned .me-manage-gear
     * button (see CSS rule further down).
     */
    #app { position: relative; }
    .badges { display: flex; flex-wrap: wrap; gap: 4px; }
    .badge {
      background: var(--tg-theme-button-color, #2196f3);
      color: var(--tg-theme-button-text-color, #fff);
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 11px;
    }
    .error-msg { color: var(--tg-theme-destructive-text-color, #e53935); text-align: center; padding: 20px; }

    .sparkline-list {
      background: var(--tg-theme-secondary-bg-color, #f9f9f9);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .sparkline-header { margin-bottom: 14px; }
    .sparkline-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--tg-theme-text-color, #1a1a1a);
    }
    .sparkline-subtitle {
      font-size: 12px;
      color: var(--tg-theme-hint-color, #888);
      margin-top: 2px;
    }
    .sparkline-row {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: background-color 120ms ease;
      padding: 12px 8px;
      border-bottom: 0.5px solid var(--tg-theme-hint-color, #888);
      border-radius: 8px;
    }
    .sparkline-row-text {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .sparkline-row-chart {
      flex: 1 1 auto;
      min-width: 0;
    }
    .sparkline-row-chart svg {
      display: block;
      width: 100%;
      height: auto;
    }
    .sparkline-row:first-of-type {
      border-top: 0.5px solid var(--tg-theme-hint-color, #888);
    }
    .sparkline-row:last-of-type { border-bottom: none; }
    .sparkline-row:hover { background: var(--tg-theme-secondary-bg-color, #ececec); }
    .sparkline-row:active,
    .sparkline-row:focus-visible {
      background: var(--tg-theme-secondary-bg-color, #ececec);
      outline: 2px solid var(--tg-theme-button-color, #2196f3);
      outline-offset: 0;
    }
    @media (hover: none) {
      .sparkline-row:hover { background: transparent; }
      .sparkline-row:active { background: var(--tg-theme-secondary-bg-color, #ececec); }
    }
    .sparkline-pair-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--tg-theme-text-color, #1a1a1a);
      white-space: nowrap;
    }
    .sparkline-row-delta {
      font-size: 12px;
      font-family: ui-monospace, 'SF Mono', 'Menlo', monospace;
      color: var(--tg-theme-hint-color, #888);
      margin-top: 2px;
    }
    .sparkline-row-delta-empty { font-style: italic; }
    /* sparkline-series-prefix color is set inline via role constants:
       BID uses #1D9E75 (ratepair.ColorBid), ASK uses #378ADD (ratepair.ColorAsk).
       Delta text colors are also inline: positive #3B6D11 (ratepair.ColorDeltaUp),
       negative #A32D2D (ratepair.ColorDeltaDown). All four live in
       internal/domain/ratepair/ratepair.go and are baked into app.wasm at build time.
       These classes are emitted by renderValueLine / renderChartArea and now appear
       only inside RenderPairModal's per-series blocks; the collapsed list-row layout
       no longer uses them. */
    .sparkline-series-prefix { font-weight: 600; }
    .sparkline-value-line { display: flex; flex-wrap: wrap; gap: 4px; }
    .sparkline-series-value {
      font-size: 11px;
      font-family: ui-monospace, 'SF Mono', 'Menlo', monospace;
      color: var(--tg-theme-hint-color, #888);
      white-space: nowrap;
    }
    .sparkline-value-sep { display: none; }
    .sparkline-value-delta { font-weight: 500; }
    .sparkline-no-data {
      font-size: 11px;
      font-style: italic;
      color: var(--tg-theme-hint-color, #888);
      flex: 1;
      text-align: center;
    }
    .sparkline-footer {
      font-size: 11px;
      color: var(--tg-theme-hint-color, #888);
      margin-top: 14px;
      text-align: center;
    }
    .period-chip-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .period-chip {
      background: transparent;
      border: 1px solid var(--tg-theme-hint-color, #aaa);
      color: var(--tg-theme-hint-color, #888);
      border-radius: 12px;
      padding: 3px 10px;
      font-size: 12px;
      cursor: pointer;
      line-height: 1.4;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .period-chip--active {
      background: var(--tg-theme-button-color, #2196f3);
      border-color: var(--tg-theme-button-color, #2196f3);
      color: var(--tg-theme-button-text-color, #fff);
      font-weight: 500;
    }
    .sparkline-empty,
    .sparkline-error {
      text-align: center;
      padding: 60px 12px;
      color: var(--tg-theme-hint-color, #888);
      background: var(--tg-theme-secondary-bg-color, #f9f9f9);
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .sparkline-skeleton {
      height: 200px;
      border-radius: 10px;
      margin-bottom: 12px;
      background:
        linear-gradient(90deg,
          var(--tg-theme-secondary-bg-color, #f5f5f5) 0%,
          var(--tg-theme-bg-color, #fff) 50%,
          var(--tg-theme-secondary-bg-color, #f5f5f5) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite ease-in-out;
    }
    @keyframes shimmer {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    .me-pair-modal {
      position: fixed; inset: 0; z-index: 1100;
      display: flex; align-items: center; justify-content: center;
    }
    .me-pair-modal-backdrop {
      position: absolute; inset: 0;
      background: rgba(0, 0, 0, 0.5);
    }
    .me-pair-modal-card {
      position: relative;
      width: min(92vw, 480px);
      max-height: 88vh;
      overflow-y: auto;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.25);
    }
    .me-pair-modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .me-pair-modal-title { font-size: 17px; font-weight: 600; }
    .me-pair-modal-close {
      background: transparent;
      color: var(--tg-theme-text-color, #000);
      border: none;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      padding: 4px 8px;
    }
    .me-pair-modal-body { display: flex; flex-direction: column; gap: 12px; }
    .me-pair-modal-series { display: flex; flex-direction: column; gap: 6px; }
    .me-pair-modal-spread {
      font-size: 12px;
      font-family: ui-monospace, 'SF Mono', 'Menlo', monospace;
      color: var(--tg-theme-hint-color, #888);
    }
    .me-pair-modal-time {
      font-size: 12px;
      color: var(--tg-theme-hint-color, #888);
    }
    @media (prefers-reduced-motion: no-preference) {
      .me-pair-modal-card { animation: me-pair-modal-pop 140ms ease-out; }
      @keyframes me-pair-modal-pop {
        from { transform: translateY(8px); opacity: 0; }
        to   { transform: none;            opacity: 1; }
      }
    }
    .me-pair-modal-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .me-pair-modal-history {
      background: var(--tg-theme-button-color, #2196f3);
      color: var(--tg-theme-button-text-color, #fff);
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 14px;
    }
    .me-pair-history-back {
      background: transparent;
      color: var(--tg-theme-link-color, #2196f3);
      border: none;
      cursor: pointer;
      font-size: 14px;
      padding: 4px 8px;
      margin-bottom: 12px;
    }
    .me-pair-history-entry {
      padding: 10px 0;
      border-bottom: 1px solid var(--tg-theme-hint-color, #ddd);
    }
    .me-pair-history-entry:last-child {
      border-bottom: none;
    }
    .me-pair-history-head {
      font-size: 12px;
      color: var(--tg-theme-hint-color, #888);
      margin-bottom: 4px;
    }
    .me-pair-history-bid,
    .me-pair-history-ask {
      font-family: ui-monospace, 'SF Mono', 'Menlo', monospace;
      font-size: 13px;
      line-height: 1.4;
    }
    .me-pair-history-empty,
    .me-pair-history-loading {
      font-size: 13px;
      color: var(--tg-theme-hint-color, #888);
      padding: 24px 0;
      text-align: center;
    }
    .me-pair-history-error {
      font-size: 13px;
      color: var(--tg-theme-destructive-text-color, #e53935);
      padding: 24px 0;
      text-align: center;
    }
    .me-pair-history-pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--tg-theme-hint-color, #ddd);
    }
    .me-pair-history-prev,
    .me-pair-history-next {
      background: var(--tg-theme-button-color, #2196f3);
      color: var(--tg-theme-button-text-color, #fff);
      border: none;
      border-radius: 6px;
      padding: 10px 18px;
      min-height: 44px;
      cursor: pointer;
      font-size: 14px;
    }
    .me-pair-history-prev:disabled,
    .me-pair-history-next:disabled {
      opacity: 0.35;
      cursor: default;
    }
    .me-pair-history-page {
      font-size: 13px;
      color: var(--tg-theme-hint-color, #888);
    }

    /*
     * Boot loader shown until WASM downloads and the dispatcher runs.
     * All CSS is inline so it paints on first byte — no extra round-trip.
     * Theme variables come from Telegram WebApp; fallbacks keep it usable in
     * a regular browser tab during local dev.
     */
    .app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: var(--tg-theme-bg-color, #ffffff);
      z-index: 1000;
    }
    .app-loader-disc {
      position: relative;
      width: 84px;
      height: 84px;
    }
    .app-loader-arc {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid transparent;
    }
    .app-loader-arc-outer {
      border-top-color: var(--tg-theme-button-color, #2196f3);
      border-right-color: var(--tg-theme-button-color, #2196f3);
      animation: app-loader-spin 1s linear infinite;
    }
    .app-loader-arc-inner {
      inset: 10px;
      border-bottom-color: var(--tg-theme-hint-color, #888);
      border-left-color: var(--tg-theme-hint-color, #888);
      opacity: .55;
      animation: app-loader-spin 1.4s linear reverse infinite;
    }
    .app-loader-mark {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 600;
      line-height: 1;
      color: var(--tg-theme-button-color, #2196f3);
    }
    .app-loader-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--tg-theme-text-color, #000);
      letter-spacing: .3px;
    }
    .app-loader-subtitle {
      font-size: 12px;
      color: var(--tg-theme-hint-color, #888);
    }
    @keyframes app-loader-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .app-loader-arc-outer,
      .app-loader-arc-inner { animation-duration: 3s; }
    }
    /* Subscription editor screen */
    .me-edit-topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0 8px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--tg-theme-secondary-bg-color, #eee);
    }
    .me-edit-back {
      background: transparent;
      border: 1px solid var(--tg-theme-hint-color, #aaa);
      color: var(--tg-theme-link-color, #2196f3);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      min-height: 44px;
    }
    .me-edit-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--tg-theme-text-color, #222);
    }
    .me-edit-section-title {
      font-size: 14px;
      font-weight: 600;
      margin: 14px 0 8px;
      color: var(--tg-theme-text-color, #222);
    }
    .me-edit-label {
      display: block;
      font-size: 12px;
      color: var(--tg-theme-hint-color, #888);
      margin-bottom: 4px;
    }
    .me-edit-select,
    .me-edit-input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      border-radius: 8px;
      background: var(--tg-theme-secondary-bg-color, #f9f9f9);
      color: var(--tg-theme-text-color, #222);
      font-size: 14px;
      min-height: 44px;
      margin-bottom: 10px;
    }
    /*
     * Two-step provider/pair picker.
     * The trigger button looks like an input field. When open, an overlay
     * with a search input + paginated list is positioned absolutely below
     * the trigger, on top of a transparent backdrop that catches outside
     * clicks. Both pickers share this class family; only one is open at a
     * time (enforced by the controller).
     */
    .me-edit-picker {
      position: relative;
      margin-bottom: 10px;
    }
    .me-edit-picker-trigger {
      width: 100%;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      border-radius: 8px;
      background: var(--tg-theme-secondary-bg-color, #f9f9f9);
      color: var(--tg-theme-text-color, #222);
      font-size: 14px;
      min-height: 44px;
      cursor: pointer;
      text-align: left;
    }
    .me-edit-picker-trigger:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .me-edit-picker-trigger-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .me-edit-picker-caret {
      color: var(--tg-theme-hint-color, #888);
      font-size: 11px;
    }
    /*
     * Children of the trigger must not catch pointer events: the delegated
     * #app click handler dispatches on event.target.id, which would otherwise
     * see the inner <span> (label or caret) instead of the trigger button,
     * making center-clicks no-ops. pointer-events: none on the children
     * passes the click straight to the button.
     */
    .me-edit-picker-trigger > * {
      pointer-events: none;
    }
    .me-edit-picker-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: transparent;
    }
    .me-edit-picker-overlay {
      position: absolute;
      left: 0;
      right: 0;
      top: 100%;
      margin-top: 4px;
      z-index: 60;
      background: var(--tg-theme-bg-color, #fff);
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      padding: 8px;
      max-height: 60vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .me-edit-picker-search {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      margin-bottom: 6px;
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      border-radius: 6px;
      background: var(--tg-theme-secondary-bg-color, #f9f9f9);
      color: var(--tg-theme-text-color, #222);
      font-size: 14px;
      min-height: 36px;
    }
    .me-edit-picker-results {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0; /* required so .me-edit-picker-list-area can shrink */
    }
    /*
     * .me-edit-picker-list-area is the scrollable region. Pagination sits
     * outside of it (sibling under .me-edit-picker-results) so prev/next
     * stays pinned at the bottom of the overlay regardless of list length.
     */
    .me-edit-picker-list-area {
      flex: 1 1 auto;
      overflow-y: auto;
      min-height: 0;
    }
    .me-edit-picker-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .me-edit-picker-item {
      padding: 12px 10px;
      min-height: 44px;
      display: flex;
      align-items: center;
      cursor: pointer;
      color: var(--tg-theme-text-color, #222);
      border-radius: 6px;
      font-size: 14px;
    }
    .me-edit-picker-item:hover,
    .me-edit-picker-item:focus-visible {
      background: var(--tg-theme-secondary-bg-color, #eef3fb);
      outline: none;
    }
    .me-edit-picker-item-active {
      background: var(--tg-theme-button-color, #2ea6ff);
      color: var(--tg-theme-button-text-color, #fff);
    }
    .me-edit-picker-empty {
      padding: 16px 10px;
      text-align: center;
      font-size: 13px;
      color: var(--tg-theme-hint-color, #888);
    }
    .me-edit-picker-pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--tg-theme-hint-color, #ddd);
    }
    .me-edit-picker-prev,
    .me-edit-picker-next {
      background: var(--tg-theme-button-color, #2ea6ff);
      color: var(--tg-theme-button-text-color, #fff);
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      min-height: 36px;
      font-size: 13px;
      cursor: pointer;
    }
    .me-edit-picker-prev:disabled,
    .me-edit-picker-next:disabled {
      opacity: 0.35;
      cursor: default;
    }
    .me-edit-picker-page-info {
      font-size: 12px;
      color: var(--tg-theme-hint-color, #888);
    }
    .me-edit-cond-type-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    .me-edit-cond-radio {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: var(--tg-theme-text-color, #222);
      cursor: pointer;
      min-height: 44px;
      padding: 8px 10px;
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      border-radius: 8px;
    }
    .me-edit-help {
      font-size: 11px;
      color: var(--tg-theme-hint-color, #999);
      margin: -6px 0 10px;
    }
    .me-edit-form-error {
      font-size: 12px;
      color: #e53935;
      margin-bottom: 8px;
      min-height: 1.4em;
    }
    .me-edit-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .me-edit-save,
    .me-edit-cancel {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      min-height: 44px;
    }
    .me-edit-save {
      background: var(--tg-theme-button-color, #2196f3);
      color: var(--tg-theme-button-text-color, #fff);
      border: none;
    }
    .me-edit-cancel {
      background: transparent;
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      color: var(--tg-theme-text-color, #444);
    }
    .me-edit-item-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .me-edit-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--tg-theme-secondary-bg-color, #eee);
      font-size: 13px;
      color: var(--tg-theme-text-color, #333);
    }
    .me-edit-item-source {
      font-weight: 500;
      min-width: 70px;
    }
    .me-edit-item-cond {
      flex: 1;
      color: var(--tg-theme-hint-color, #888);
    }
    .me-edit-delete {
      background: transparent;
      border: none;
      color: #e53935;
      font-size: 16px;
      cursor: pointer;
      padding: 6px 8px;
      min-height: 44px;
      min-width: 44px;
    }
    .me-edit-empty {
      text-align: center;
      padding: 30px 12px;
      color: var(--tg-theme-hint-color, #888);
      font-size: 13px;
    }
    .me-edit-loading {
      text-align: center;
      padding: 40px 12px;
      color: var(--tg-theme-hint-color, #888);
      font-size: 14px;
    }
    /*
     * List view (Your subscriptions) — search input, results slot, and the
     * "+ Add new subscription" CTA at the bottom. The results slot mirrors
     * the picker pattern so the search input survives keystrokes while the
     * paginated rows redraw underneath.
     */
    .me-edit-list-search {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      margin-bottom: 10px;
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      border-radius: 8px;
      background: var(--tg-theme-secondary-bg-color, #f9f9f9);
      color: var(--tg-theme-text-color, #222);
      font-size: 14px;
      min-height: 44px;
    }
    .me-edit-list-results {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }
    .me-edit-list-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .me-edit-list-actions .me-edit-save {
      flex: 1;
    }
    /*
     * Gear button — authenticated subscriptions screen.
     * Absolutely positioned at the top-right of #app so it floats over the
     * empty space to the right of the chart-card header instead of consuming
     * its own row above the chart. #app is given position: relative below so
     * this absolute element resolves against the app container.
     */
    .me-manage-gear {
      position: absolute;
      top: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      padding: 0;
      background: transparent;
      border: none;
      border-radius: 8px;
      color: var(--tg-theme-button-color, #2ea6ff);
      cursor: pointer;
      touch-action: manipulation;
    }
    .me-manage-gear:active {
      opacity: 0.7;
    }
    .me-manage-gear svg {
      width: 20px;
      height: 20px;
      /*
       * Same reason as .me-edit-picker-trigger > *: the delegated #app click
       * handler matches on event.target.id; a click on the SVG would set
       * target to the SVG element and miss the button id.
       */
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-loader" role="status" aria-live="polite" aria-label="Loading Beacon">
      <div class="app-loader-disc" aria-hidden="true">
        <div class="app-loader-arc app-loader-arc-outer"></div>
        <div class="app-loader-arc app-loader-arc-inner"></div>
        <span class="app-loader-mark">&#8644;</span>
      </div>
      <p class="app-loader-title">Beacon</p>
      <p class="app-loader-subtitle">Loading&#8230;</p>
    </div>
  </div>
  <script src="/wasm_exec.js"></script>
  <script>
    var wasmReady = new Promise(function(resolve, reject) {
      var go = new Go();
      WebAssembly.instantiateStreaming(fetch('/app.wasm'), go.importObject)
        .then(function(result) { go.run(result.instance); resolve(); })
        .catch(function(err) {
          console.error('WASM load failed (run make build?):', err);
          reject(err);
        });
    });
    wasmReady.then(function() {
      var initData = '';
      if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) {
        initData = window.Telegram.WebApp.initData;
      }
      if (initData) {
        window._wasm.renderMeSubscriptions();
      } else {
        // Guest path: load the public sparkline list.
        // Local-dev only: to reach the Mini App view from a normal browser tab,
        // set window.Telegram = { WebApp: { initData: '<token>' } } in DevTools
        // BEFORE the page loads. Do NOT use the ?initData= URL fallback in any
        // environment where URLs end up in access logs or Referer headers —
        // the signed payload is replayable for 24 hours.
        console.info('[beacon] No Telegram context detected — rendering public view.');
        window._wasm.renderPublicSubscriptions();
      }
    }).catch(function(err) {
      document.getElementById('app').innerHTML =
        '<p class="error-msg">Failed to load app. Did you run <code>make build</code>?</p>';
    });
  </script>
</body>
</html>
