<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://telegram.org; script-src 'self' https://telegram.org 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline';">
  <title>My Subscriptions</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      padding: 12px;
      min-height: 100vh;
    }
    .search-bar {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      border-radius: 8px;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      color: var(--tg-theme-text-color, #000);
      font-size: 15px;
      margin-bottom: 12px;
      outline: none;
    }
    .search-bar:focus { border-color: var(--tg-theme-button-color, #2196f3); }
    .card {
      background: var(--tg-theme-secondary-bg-color, #f9f9f9);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .card-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .card-pair { font-size: 13px; color: var(--tg-theme-hint-color, #888); margin-bottom: 6px; }
    .card-price { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .card-time { font-size: 12px; color: var(--tg-theme-hint-color, #888); margin-bottom: 8px; }
    .badges { display: flex; flex-wrap: wrap; gap: 4px; }
    .badge {
      background: var(--tg-theme-button-color, #2196f3);
      color: var(--tg-theme-button-text-color, #fff);
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 11px;
    }
    .pagination { display: flex; justify-content: center; gap: 12px; margin-top: 14px; }
    .pagination button {
      background: var(--tg-theme-button-color, #2196f3);
      color: var(--tg-theme-button-text-color, #fff);
      border: none;
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 14px;
      cursor: pointer;
    }
    .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
    .status { text-align: center; padding: 30px 0; color: var(--tg-theme-hint-color, #888); }
    .error-msg { color: var(--tg-theme-destructive-text-color, #e53935); text-align: center; padding: 20px; }

    .period-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .period-btn {
      flex: 1;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      color: var(--tg-theme-text-color, #000);
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .period-btn.active {
      background: var(--tg-theme-button-color, #2196f3);
      color: var(--tg-theme-button-text-color, #fff);
      border-color: var(--tg-theme-button-color, #2196f3);
    }

    .overlay-chart-wrap { width: 100%; margin-bottom: 12px; }
    .overlay-chart {
      display: block;
      width: 100%;
      height: 200px;
      background: var(--tg-theme-secondary-bg-color, #f9f9f9);
      border-radius: 10px;
      padding: 8px;
    }
    .overlay-chart-baseline {
      stroke: var(--tg-theme-hint-color, #888);
      stroke-width: 0.5;
      stroke-dasharray: 3 3;
    }
    .overlay-chart-axis-label {
      fill: var(--tg-theme-hint-color, #888);
      font-size: 10px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .overlay-chart-empty,
    .overlay-chart-error {
      text-align: center;
      padding: 60px 12px;
      color: var(--tg-theme-hint-color, #888);
      background: var(--tg-theme-secondary-bg-color, #f9f9f9);
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .overlay-chart-skeleton {
      height: 200px;
      border-radius: 10px;
      margin-bottom: 12px;
      background:
        linear-gradient(90deg,
          var(--tg-theme-secondary-bg-color, #f5f5f5) 0%,
          var(--tg-theme-bg-color, #fff) 50%,
          var(--tg-theme-secondary-bg-color, #f5f5f5) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite ease-in-out;
    }
    @keyframes shimmer {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    .overlay-chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      margin-bottom: 14px;
      font-size: 12px;
    }
    .overlay-chart-legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .overlay-chart-legend-swatch {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .list-toggle-wrap { margin: 8px 0 12px; }
    .list-toggle {
      width: 100%;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      color: var(--tg-theme-text-color, #000);
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="app">Loading&#8230;</div>
  <script src="/wasm_exec.js"></script>
  <script>
    var wasmReady = new Promise(function(resolve, reject) {
      var go = new Go();
      WebAssembly.instantiateStreaming(fetch('/app.wasm'), go.importObject)
        .then(function(result) { go.run(result.instance); resolve(); })
        .catch(function(err) { console.error('WASM load failed (run make build?):', err); reject(err); });
    });
    wasmReady
      .then(function() { window._wasm.renderMeSubscriptions(); })
      .catch(function(err) {
        document.getElementById('app').innerHTML =
          '<p class="error-msg">Failed to load app. Did you run <code>make build</code>?</p>';
      });
  </script>
</body>
</html>
